<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏁 HexGL — MONSTER MODE</title>
<link rel="stylesheet" href="/css/wiki.css">
<link rel="stylesheet" href="/css/game-fullscreen.css">
<style>
.game-card{background:rgba(255,255,255,.03);border:1px solid #333;border-radius:16px;padding:18px}
.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.stat{background:rgba(255,255,255,.05);padding:10px;border-radius:10px;text-align:center}
#hexglFrame{width:100%;height:70vh;border:none;border-radius:12px;background:#000}
</style>
</head>
<body>
<header id="site-header"></header>
<div id="layout"><div id="main-wrapper"><main id="content">
<h1>🏁 HexGL — MONSTER MODE</h1>

<div class="game-card">
<div class="hud">
<div class="stat"><div>Player</div><div id="player"></div></div>
<div class="stat"><div>Best</div><div id="best">0</div></div>
<div class="stat"><div>Timer</div><div id="timer">0.000</div></div>
<div class="stat"><div>XP</div><div id="xp">0</div></div>
</div>

<iframe id="hexglFrame"></iframe>

<button id="startBtn">Start</button>
<button id="finishBtn">Finish</button>
<button id="resetBtn">Reset</button>

</div>

</main></div></div>

<script src="/js/wiki.js"></script>
<script src="/js/identity-gate.js"></script>
<script src="/js/game-fullscreen.js"></script>
<script type="module">
import { mountGame }              from '/js/arcade/core/game-shell.js';
import { bootstrapHexGLMonster } from '/js/arcade/games/hexgl-monster/bootstrap.js';
mountGame({ root: document.querySelector('.game-card'), bootstrap: bootstrapHexGLMonster });
</script>
</body>
</html>
