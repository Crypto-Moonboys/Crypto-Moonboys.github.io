<svg xmlns="http://www.w3.org/2000/svg" width="384" height="64" viewBox="0 0 384 64">
  <rect width="384" height="64" fill="#04020c"/>
  <!-- road -->
  <polygon points="32,0 64,16 32,32 0,16" fill="#141420"/>
  <line x1="32" y1="4" x2="32" y2="28" stroke="#ffd84d" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <polygon points="32,0 64,16 32,32 0,16" fill="none" stroke="#383860" stroke-width="1"/>
  <!-- pavement -->
  <polygon points="96,0 128,16 96,32 64,16" fill="#1c1c2e"/>
  <line x1="96" y1="4" x2="96" y2="28" stroke="#242438" stroke-width="1" opacity="0.6"/>
  <polygon points="96,0 128,16 96,32 64,16" fill="none" stroke="#2a2a44" stroke-width="1"/>
  <!-- plaza -->
  <polygon points="160,0 192,16 160,32 128,16" fill="#121228"/>
  <line x1="160" y1="4" x2="160" y2="28" stroke="#1e1e42" stroke-width="1" opacity="0.8"/>
  <polygon points="160,0 192,16 160,32 128,16" fill="none" stroke="#5ef2ff" stroke-width="1" opacity="0.3"/>
  <!-- graffiti -->
  <polygon points="224,0 256,16 224,32 192,16" fill="#100818"/>
  <ellipse cx="210" cy="12" rx="8" ry="5" fill="#ff4fd8" opacity="0.5"/>
  <ellipse cx="230" cy="18" rx="6" ry="4" fill="#8dff6a" opacity="0.5"/>
  <polygon points="224,0 256,16 224,32 192,16" fill="none" stroke="#1a0a28" stroke-width="1"/>
  <!-- crossing -->
  <polygon points="288,0 320,16 288,32 256,16" fill="#141420"/>
  <rect x="260" y="14" width="6" height="4" fill="white" opacity="0.15"/>
  <rect x="270" y="14" width="6" height="4" fill="white" opacity="0.15"/>
  <rect x="280" y="14" width="6" height="4" fill="white" opacity="0.15"/>
  <polygon points="288,0 320,16 288,32 256,16" fill="none" stroke="#383860" stroke-width="1"/>
  <!-- water -->
  <polygon points="352,0 384,16 352,32 320,16" fill="#08203a"/>
  <line x1="338" y1="14" x2="352" y2="18" stroke="#0a3060" stroke-width="1" opacity="0.5"/>
  <line x1="352" y1="14" x2="366" y2="18" stroke="#0a3060" stroke-width="1" opacity="0.5"/>
  <polygon points="352,0 384,16 352,32 320,16" fill="none" stroke="#0a2040" stroke-width="1"/>
  <!-- labels -->
  <text x="32" y="50" text-anchor="middle" fill="#333355" font-size="8" font-family="monospace">ROAD</text>
  <text x="96" y="50" text-anchor="middle" fill="#333355" font-size="8" font-family="monospace">PAVEMENT</text>
  <text x="160" y="50" text-anchor="middle" fill="#333355" font-size="8" font-family="monospace">PLAZA</text>
  <text x="224" y="50" text-anchor="middle" fill="#333355" font-size="8" font-family="monospace">GRAFFITI</text>
  <text x="288" y="50" text-anchor="middle" fill="#333355" font-size="8" font-family="monospace">CROSSING</text>
  <text x="352" y="50" text-anchor="middle" fill="#333355" font-size="8" font-family="monospace">WATER</text>
</svg>
