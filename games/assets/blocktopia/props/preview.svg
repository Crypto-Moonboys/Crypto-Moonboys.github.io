  <ellipse cx="156" cy="40" rx="18" ry="10" fill="#1a5500"/>
  <ellipse cx="148" cy="39" rx="10" ry="8" fill="#226600"/>
  <ellipse cx="164" cy="39" rx="10" ry="8" fill="#226600"/>
  <circle cx="144" cy="36" r="3" fill="#4466ff" opacity="0.85"/>
  <circle cx="156" cy="33" r="3" fill="#4466ff" opacity="0.85"/>
  <circle cx="166" cy="36" r="3" fill="#4466ff" opacity="0.85"/>
  <circle cx="150" cy="34" r="2" fill="#8899ff" opacity="0.7"/>
