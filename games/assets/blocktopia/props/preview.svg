  <rect x="100" y="12" width="20" height="38" fill="none" stroke="#ff4fd8" stroke-width="1" opacity="0.5"/>
  <rect x="103" y="15" width="14" height="12" fill="#ff4fd8" opacity="0.25"/>
  <rect x="106" y="18" width="2" height="6" fill="#ffd84d" opacity="0.9"/>
