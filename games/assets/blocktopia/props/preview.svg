  <rect x="16" y="10" width="8" height="7" fill="#5a5a7a"/>
  <circle cx="20" cy="13" r="6" fill="#5ef2ff" opacity="0.1"/>
  <circle cx="20" cy="13" r="4" fill="#5ef2ff" opacity="0.2"/>
  <circle cx="20" cy="13" r="2" fill="#eeffff" opacity="0.9"/>
  <text x="27" y="72" text-anchor="middle" fill="#333355" font-size="7" font-family="monospace">LAMP</text>
  <!-- Terminal -->
