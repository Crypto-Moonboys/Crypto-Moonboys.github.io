<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Topia - 2P Iso Map Base</title>
    <link rel="stylesheet" href="./styles.css" />
    <!-- Colyseus v0.16 client (required for multiplayer) -->
    <script src="https://unpkg.com/colyseus.js@0.16/dist/colyseus.js"></script>
  </head>
  <body>
    <!-- Entry gate — shown while checking or when access is denied -->
    <div id="bt-gate" role="main" aria-live="polite">
      <div class="bt-gate__logo">Block Topia</div>
      <div class="bt-gate__subtitle">Multiplayer City</div>
      <div id="bt-gate-content">
        <p class="bt-gate__checking">Checking access&hellip;</p>
      </div>
      <!-- Status panel shown in the gate screen -->
      <div id="bt-gate-status-panel" data-csp-panel style="margin-top:20px;max-width:480px;margin-left:auto;margin-right:auto"></div>
    </div>

    <!-- Game shell — hidden until gate passes -->
    <div id="game-shell" style="display:none">
      <canvas id="game" aria-label="Block Topia isometric map"></canvas>
    </div>

    <script src="/js/api-config.js"></script>
    <script src="/js/identity-gate.js"></script>
    <script src="/js/components/ui-status-copy.js"></script>
<script src="/js/faction-alignment.js"></script>
    <script src="/js/components/connection-status-panel.js"></script>
    <script src="/js/components/global-player-header.js"></script>
    <script src="/js/components/live-activity-summary.js"></script>
<script type="module">
      import { BLOCKTOPIA_MULTIPLAYER_REQUIRED_XP } from "/shared/block-topia/constants.js";

      const mountOptions = { containerId: "game-shell", canvasId: "game" };

      function getApiBase() {
        const cfg = window.MOONBOYS_API || {};
        return cfg.BASE_URL ? String(cfg.BASE_URL).replace(/\/$/, "") : "";
      }

      function showGateScreen(html) {
        const content = document.getElementById("bt-gate-content");
        if (content) content.innerHTML = html;
        const gate = document.getElementById("bt-gate");
        if (gate) gate.classList.remove("bt-gate--hidden");
        const shell = document.getElementById("game-shell");
        if (shell) shell.style.display = "none";
      }

      function showGameShell() {
        const gate = document.getElementById("bt-gate");
        if (gate) gate.classList.add("bt-gate--hidden");
        const shell = document.getElementById("game-shell");
        if (shell) shell.style.display = "";
      }

      function buildUnlinkedGate() {
        return `
          <div class="bt-gate__icon" aria-hidden="true">🔒</div>
          <h1 class="bt-gate__heading">Telegram link required</h1>
          <p class="bt-gate__body">
            Link your Telegram account to enter Block Topia multiplayer.<br>
            Arcade games remain free to play.
          </p>
          <div class="bt-gate__actions">
            <a class="bt-gate__btn bt-gate__btn--primary" href="/gkniftyheads-incubator.html">
              Link Telegram
            </a>
            <a class="bt-gate__btn bt-gate__btn--secondary" href="/games/invaders-3008/">
              Play Invaders 3008 (Free)
            </a>
          </div>`;
      }

      function buildXpGate(current, required) {
        const pct = Math.min(100, Math.floor((current / required) * 100));
        const ariaXpNow = Math.min(required, Math.max(0, current));
        const xpLabel = current === 0
          ? `Your Arcade XP is 0 / ${required}. Play arcade games, then sync Telegram to convert accepted scores into Arcade XP.`
          : `Your Arcade XP: ${current} / ${required}`;
        return `
          <div class="bt-gate__icon" aria-hidden="true">🎮</div>
          <h1 class="bt-gate__heading">You need ${required} Arcade XP to enter</h1>
          <p class="bt-gate__body">
            Play arcade games and sync Telegram to earn Arcade XP.<br>
            Block Topia multiplayer unlocks at ${required} Arcade XP.
          </p>
          <p class="bt-gate__xp-label">${xpLabel}</p>
          <div class="bt-gate__xp-bar-wrap" role="progressbar" aria-valuenow="${ariaXpNow}" aria-valuemin="0" aria-valuemax="${required}" aria-label="XP progress">
            <div class="bt-gate__xp-bar" style="width:${pct}%"></div>
          </div>
          <div class="bt-gate__actions">
            <a class="bt-gate__btn bt-gate__btn--primary" href="/games/invaders-3008/">
              Play Invaders 3008
            </a>
            <a class="bt-gate__btn bt-gate__btn--secondary" href="/games/leaderboard.html">
              Arcade Leaderboard
            </a>
          </div>`;
      }

      function buildErrorGate(message) {
        return `
          <div class="bt-gate__icon" aria-hidden="true">⚠️</div>
          <h1 class="bt-gate__heading">Access check failed</h1>
          <p class="bt-gate__body">${message}</p>
          <div class="bt-gate__actions">
            <button class="bt-gate__btn bt-gate__btn--primary" onclick="location.reload()">
              Try Again
            </button>
          </div>`;
      }

      async function fetchProgressionForGate(telegramAuth) {
        const apiBase = getApiBase();
        if (!apiBase) throw new Error("api_base_missing");
        const res = await fetch(`${apiBase}/blocktopia/progression`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ telegram_auth: telegramAuth }),
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok || !payload || payload.ok !== true) {
          throw new Error(payload?.error || "progression_fetch_failed");
        }
        return payload.progression || null;
      }

      async function runGateAndLaunch() {
        const identity = window.MOONBOYS_IDENTITY || null;

        // ── Step 1: Telegram link check ──────────────────────────────
        const linked = !!(
          identity &&
          typeof identity.isTelegramLinked === "function" &&
          identity.isTelegramLinked()
        );
        if (!linked) {
          console.log("blocktopia_gate_progression_result", JSON.stringify({
            linked: false,
            arcade_xp_total: null,
            required_xp: null,
            can_enter_multiplayer: false,
            reason: "not_linked",
            status: "blocked",
          }));
          showGateScreen(buildUnlinkedGate());
          return;
        }

        // ── Step 2: Resolve signed auth token ────────────────────────
        let telegramAuth =
          identity && typeof identity.getSignedTelegramAuth === "function"
            ? identity.getSignedTelegramAuth()
            : null;
        if (!telegramAuth && identity && typeof identity.restoreLinkedTelegramAuth === "function") {
          const restored = await identity.restoreLinkedTelegramAuth().catch(() => null);
          telegramAuth = restored?.ok ? restored.telegram_auth : null;
        }
        if (!telegramAuth) {
          console.log("blocktopia_gate_progression_result", JSON.stringify({
            linked: true,
            arcade_xp_total: null,
            required_xp: null,
            can_enter_multiplayer: false,
            reason: "no_telegram_auth",
            status: "blocked",
          }));
          showGateScreen(buildUnlinkedGate());
          return;
        }

        // ── Step 3: XP gate check ────────────────────────────────────
        let progression = null;
        try {
          progression = await fetchProgressionForGate(telegramAuth);
        } catch (_err) {
          console.log("blocktopia_gate_progression_result", JSON.stringify({
            linked: true,
            arcade_xp_total: null,
            required_xp: null,
            can_enter_multiplayer: false,
            reason: "progression_fetch_failed",
            status: "error",
          }));
          showGateScreen(
            buildErrorGate("Unable to verify multiplayer access right now. Please try again.")
          );
          return;
        }
        const arcadeXpTotal = Math.max(0, Math.floor(Number(progression?.arcade_xp_total) || 0));
        const requiredXp = Math.max(1, Math.floor(Number(progression?.required_xp) || BLOCKTOPIA_MULTIPLAYER_REQUIRED_XP));
        const canEnter = progression?.can_enter_multiplayer === true || arcadeXpTotal >= requiredXp;
        if (!canEnter) {
          console.log("blocktopia_gate_progression_result", JSON.stringify({
            linked: true,
            arcade_xp_total: arcadeXpTotal,
            required_xp: requiredXp,
            can_enter_multiplayer: false,
            reason: "insufficient_xp",
            status: "blocked",
          }));
          showGateScreen(buildXpGate(arcadeXpTotal, requiredXp));
          return;
        }

        console.log("blocktopia_gate_progression_result", JSON.stringify({
          linked: true,
          arcade_xp_total: arcadeXpTotal,
          required_xp: requiredXp,
          can_enter_multiplayer: true,
          reason: "xp_satisfied",
          status: "pass",
        }));

        // ── Gate passed: mount the map, then connect multiplayer ─────
        try {
          await mountAndConnect(telegramAuth, arcadeXpTotal);
        } catch (_mountErr) {
          showGateScreen(
            buildErrorGate("Unable to start Block Topia right now. Please try again.")
          );
        }
      }

      async function mountAndConnect(telegramAuth, arcadeXpTotal) {
        // Dynamic imports — main.js and network.js are only loaded after the
        // server-side XP gate has been verified.  Loading them earlier would
        // render the map canvas before the check completes.
        await import("./main.js");
        const { connectMultiplayer, sendMovement } = await import("./network.js");

        // main.js registers window.BlockTopiaMap synchronously during evaluation.
        const api = window.BlockTopiaMap;
        if (!api || typeof api.mount !== "function") {
          throw new Error("BlockTopiaMap API unavailable after import");
        }
        api.mount(mountOptions);

        // Gate fully passed — reveal the game shell.
        showGameShell();

        const playerName = `Player_${Math.floor(Math.random() * 9000) + 1000}`;
        console.log(`[BlockTopia] gate passed — ${arcadeXpTotal} XP — connecting multiplayer`);
        connectMultiplayer({
          playerName,
          roomId: "city",
          telegramAuth,
          onStatus(status) {
            window.BlockTopiaMap?.setConnectionStatus(status);
            if (typeof status.sessionId === "string" && status.sessionId) {
              window.BlockTopiaMap?.setLocalPlayer({ sessionId: status.sessionId });
            }
          },
          onPlayers(players) {
            window.BlockTopiaMap?.updatePlayers(players);
          },
          onFeed(msg) {
            console.log("[BlockTopia feed]", msg);
          },
        }).then((connectedRoom) => {
          if (connectedRoom) {
            window.BlockTopiaMap?.setPositionBroadcastSink(({ x, y }) => sendMovement(x, y));
          }
        });
      }

      runGateAndLaunch();

      const cleanup = () => {
        if (window.BlockTopiaMap && typeof window.BlockTopiaMap.destroy === "function") {
          window.BlockTopiaMap.destroy();
        }
      };

      window.addEventListener("pagehide", cleanup, { once: true });
      window.addEventListener("beforeunload", cleanup, { once: true });
    </script>
  </body>
</html>
