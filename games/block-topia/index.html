<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Topia - 2 Player Base</title>
  <meta name="description" content="Block Topia 2-player multiplayer base build." />
  <link rel="stylesheet" href="./style.css" />
  <script data-cfasync="false">
    window.BLOCK_TOPIA_SERVER = window.BLOCK_TOPIA_SERVER || 'wss://game.cryptomoonboys.com';
  </script>
</head>
<body>
  <canvas id="world-canvas" aria-label="Block Topia map"></canvas>

  <div id="hud">
    <div id="hud-main">
      <span id="player-name">Player: -</span>
      <span id="room-status">Room: city</span>
      <span id="population-status">Players: 0 / 2</span>
    </div>
    <div id="hud-connection">Connection: connecting</div>
  </div>

  <div id="status-line" aria-live="polite">Starting Block Topia 2-player base...</div>
  <div id="error-banner" class="hidden" role="alert" aria-live="assertive"></div>

  <script src="https://unpkg.com/colyseus.js@0.16/dist/colyseus.js" data-cfasync="false"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
