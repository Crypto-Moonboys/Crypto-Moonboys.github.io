<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Topia - 2P Iso Map Base</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="game-shell">
      <canvas id="game" aria-label="Block Topia isometric map"></canvas>
    </div>
    <script type="module">
      import "./main.js";

      const mountOptions = { containerId: "game-shell", canvasId: "game" };
      const MAX_MOUNT_ATTEMPTS = 8;
      let mountAttempts = 0;

      const tryMount = () => {
        const api = window.BlockTopiaMap;
        if (api && typeof api.mount === "function") {
          api.mount(mountOptions);
          return;
        }

        mountAttempts += 1;
        if (mountAttempts < MAX_MOUNT_ATTEMPTS) {
          requestAnimationFrame(tryMount);
        } else {
          console.error("BlockTopiaMap mount failed: API unavailable");
        }
      };

      tryMount();

      const cleanup = () => {
        if (window.BlockTopiaMap && typeof window.BlockTopiaMap.destroy === "function") {
          window.BlockTopiaMap.destroy();
        }
      };

      window.addEventListener("pagehide", cleanup, { once: true });
      window.addEventListener("beforeunload", cleanup, { once: true });
    </script>
  </body>
</html>
