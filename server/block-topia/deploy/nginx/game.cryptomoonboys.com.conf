server {
    listen 80;
    listen [::]:80;
    server_name game.cryptomoonboys.com;

    # Keep ACME challenge on HTTP
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/cryptomoonboys.com;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name game.cryptomoonboys.com;

    # Issue a cert that includes game.cryptomoonboys.com before enabling this file.
    ssl_certificate /etc/letsencrypt/live/game.cryptomoonboys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.cryptomoonboys.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Optional but safe to keep for renewals
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/cryptomoonboys.com;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Proxy all Colyseus HTTP + WebSocket traffic to the local game server.
    location / {
        proxy_pass http://127.0.0.1:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
