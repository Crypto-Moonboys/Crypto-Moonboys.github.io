<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moonboys · Admin Tools</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      --bg: #0a0f19;
      --text: #e8f2ff;
      --muted: #93a8c2;
      --glass: rgba(14, 24, 40, 0.74);
      --line: rgba(148, 196, 255, 0.22);
      --good: #5df2a5;
      --warn: #ffd37b;
      --bad: #ff7387;
      --accent: #7ec5ff;
    }
    * { box-sizing: border-box; }
    .admin-page {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .shell {
      width: min(860px, 100%);
      border: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .45);
      padding: 20px;
    }
    .title { margin: 0; font-size: 1.1rem; letter-spacing: .08em; text-transform: uppercase; }
    .sub { margin: 8px 0 0; color: var(--muted); font-size: .92rem; }
    .state {
      margin: 16px 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--muted);
      font-size: .9rem;
      background: rgba(0,0,0,.15);
    }
    .state--good { border-color: color-mix(in srgb, var(--good) 42%, var(--line)); color: var(--good); }
    .state--warn { border-color: color-mix(in srgb, var(--warn) 42%, var(--line)); color: var(--warn); }
    .state--bad { border-color: color-mix(in srgb, var(--bad) 42%, var(--line)); color: var(--bad); }
    form { display: grid; gap: 12px; }
    .grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    label { display: grid; gap: 6px; font-size: .84rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    input, textarea, button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(9,15,26,.82);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    textarea { min-height: 84px; resize: vertical; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    button { cursor: pointer; }
    .ghost { color: var(--accent); border-color: rgba(126,197,255,.32); }
    .primary { border-color: rgba(93,242,165,.5); color: var(--good); font-weight: 600; }
    pre {
      margin: 0;
      font-size: .83rem;
      background: rgba(0,0,0,.3);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      overflow: auto;
      max-height: 220px;
    }
    .hidden { display: none; }
  </style>
</head>
<body >
<main id="content" role="main"><div class="admin-page"></div></main>

<!-- ── CANONICAL SCRIPT BOOT ─────────────────────────────────────── -->
<!-- data-cfasync="false" disables Cloudflare Rocket Loader per-script  -->
<!-- so placeholder nodes are never injected into the boot sequence.    -->
<!-- 1. Core config -->
<script data-cfasync="false" src="/js/api-config.js"></script>
<!-- 2. Event bus -->
<script data-cfasync="false" src="/js/arcade/core/global-event-bus.js"></script>
<!-- 3. Identity -->
<script data-cfasync="false" src="/js/identity-gate.js"></script>
<!-- 4. State -->
<script data-cfasync="false" src="/js/core/moonboys-state.js"></script>
<!-- 5. Shell + shared components -->
<script data-cfasync="false" src="/js/site-shell.js"></script>
<script data-cfasync="false" src="/js/components/connection-status-panel.js"></script>
<script data-cfasync="false" src="/js/components/global-player-header.js"></script>
<script data-cfasync="false" src="/js/components/live-activity-summary.js"></script>
<!-- 6. Page-specific scripts -->

<script data-cfasync="false" src="/js/wiki.js"></script>
<script data-cfasync="false" src="/js/faction-alignment.js"></script>
<script data-cfasync="false" src="/js/admin-blocktopia-tools.js"></script>
</body>
</html>
