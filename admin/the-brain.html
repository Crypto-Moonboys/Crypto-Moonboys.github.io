<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE BRAIN • Crypto Moonboys Admin</title>
  <link rel="stylesheet" href="/css/wiki.css">
  <link rel="stylesheet" href="/css/retro-16bit-theme.css">
  <style>
    .brain-card { background: rgba(0,255,200,0.08); border: 2px solid #00ffcc; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #00ff9d; animation: pulse 2s infinite; }
    .log-window { background: #000; border: 1px solid #00ffcc; height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; padding: 15px; white-space: pre-wrap; }
  </style>
</head>
<body class="page-admin page-the-brain">

<main id="content">
  <div class="battle-page">

    <section class="page-hero" style="background: linear-gradient(135deg, #0a0a0f, #1a0033);">
      <h1 style="color:#00ffcc; text-shadow: 0 0 20px #00ffcc;">THE BRAIN</h1>
      <p class="lead">NPC Intelligence Core • Live Control Panel</p>
    </section>

    <!-- STATUS -->
    <section class="section brain-card">
      <h2 style="color:#00ffcc;">BRAIN STATUS</h2>
      <div id="brain-status">
        <p><span class="status-dot"></span> <strong>npc-brain</strong> is <span id="status-text" style="color:#00ff9d;">ONLINE</span> • Running on port <strong>3000</strong></p>
        <p>Uptime: <span id="uptime">26h 14m</span> • Model: <span id="current-model">qwen2.5:0.5b</span></p>
      </div>
    </section>

    <!-- CONTROLS -->
    <section class="section brain-card">
      <h2 style="color:#00ffcc;">CONTROLS</h2>
      <button onclick="controlBrain('start')" class="btn btn-primary">▶ START BRAIN</button>
      <button onclick="controlBrain('stop')" class="btn btn-secondary">⏹ STOP BRAIN</button>
      <button onclick="controlBrain('restart')" class="btn btn-primary">🔄 RESTART BRAIN</button>
      
      <div style="margin-top:20px;">
        <strong>Model:</strong>
        <select id="model-select" onchange="changeModel()">
          <option value="qwen2.5:0.5b">qwen2.5:0.5b (fast)</option>
          <option value="qwen2.5:1.5b">qwen2.5:1.5b (balanced)</option>
          <option value="llama3.2:3b">llama3.2:3b (smarter)</option>
        </select>
      </div>
    </section>

    <!-- NPC MANAGEMENT -->
    <section class="section brain-card">
      <h2 style="color:#00ffcc;">NPCs</h2>
      <div id="npc-list">Loading NPCs...</div>
    </section>

    <!-- LIVE CHAT TESTER -->
    <section class="section brain-card">
      <h2 style="color:#00ffcc;">LIVE CHAT TESTER</h2>
      <select id="test-npc" style="margin-bottom:10px;"></select>
      <input id="test-input" type="text" placeholder="Type message to NPC..." style="width:100%; padding:12px; margin-bottom:10px;">
      <button onclick="sendTestMessage()" class="btn btn-primary">SEND TO NPC</button>
      <div id="test-response" class="log-window" style="margin-top:15px; min-height:120px;"></div>
    </section>

    <!-- REAL-TIME LOGS -->
    <section class="section brain-card">
      <h2 style="color:#00ffcc;">LIVE LOGS</h2>
      <div id="live-logs" class="log-window"></div>
    </section>

  </div>
</main>

<script src="/js/site-shell.js"></script>
<script>
// ============== BRAIN CONTROL PANEL ==============
async function controlBrain(action) {
  const res = await fetch('/api/brain/control', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action })
  });
  const data = await res.json();
  alert(data.message || 'Action completed');
  location.reload();
}

async function changeModel() {
  const model = document.getElementById('model-select').value;
  await fetch('/api/brain/model', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model })
  });
  alert('Model changed. Restarting brain...');
  controlBrain('restart');
}

// Load live data (you can expand this later)
setTimeout(() => {
  console.log('%cTHE BRAIN control panel ready', 'color:#00ffcc; font-size:14px');
}, 1000);
</script>

</body>
</html>
