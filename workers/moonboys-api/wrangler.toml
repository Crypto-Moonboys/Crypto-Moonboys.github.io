name = "moonboys-api"
main = "worker.js"
compatibility_date = "2025-01-01"

# D1 binding names are committed for readability; IDs must be environment-specific.
# Configure real IDs in [env.<name>] sections, not in top-level config.
#
# [env.production]
# [[env.production.d1_databases]]
# binding = "DB"
# database_name = "wikicoms"
# database_id = "<PROD_WIKICOMS_D1_ID>"

[env.dev]
[[env.dev.d1_databases]]
binding = "DB"
database_name = "wikicoms"
database_id = "YOUR_DEV_WIKICOMS_D1_ID"

[env.staging]
[[env.staging.d1_databases]]
binding = "DB"
database_name = "wikicoms"
database_id = "YOUR_STAGING_WIKICOMS_D1_ID"

[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "wikicoms"
database_id = "YOUR_PRODUCTION_WIKICOMS_D1_ID"

# ── Telegram secrets ──────────────────────────────────────────────────────────
# Required for POST /telegram/auth and POST /telegram/webhook.
# Set via Wrangler CLI — never commit values to source control:
#
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_BOT_USERNAME
#
# TELEGRAM_BOT_TOKEN    — The bot token from BotFather (used for HMAC verification).
# TELEGRAM_BOT_USERNAME — The bot @username (used for widget configuration docs).
#
# BotFather setup:
#   /setdomain   → set to:  moonboys-api.sercullen.workers.dev
#   Webhook URL  → POST https://moonboys-api.sercullen.workers.dev/telegram/webhook
#   Auth URL     → https://moonboys-api.sercullen.workers.dev/telegram/auth

# ── Anti-cheat admin secrets ──────────────────────────────────────────────────
# Required for /gkban, /gkunban, /gkrisk, /gkclearstrikes bot commands and for
# the GET /telegram/user/status route to read telegram_anticheat_state from D1.
# Set via Wrangler CLI — never commit values to source control:
#
#   wrangler secret put ADMIN_TELEGRAM_IDS   (comma-separated numeric Telegram user IDs)
#   wrangler secret put ADMIN_SECRET         (must match the anti-cheat worker's ADMIN_SECRET)
#   wrangler secret put ANTI_CHEAT_WORKER_URL (e.g. https://moonboys-anti-cheat.sercullen.workers.dev)
#
# ADMIN_TELEGRAM_IDS   — CSV of Telegram user IDs authorised to run admin bot commands.
# ADMIN_SECRET         — Shared secret forwarded as X-Admin-Secret to the anti-cheat worker.
# ANTI_CHEAT_WORKER_URL — Base URL of the deployed anti-cheat Cloudflare Worker.
