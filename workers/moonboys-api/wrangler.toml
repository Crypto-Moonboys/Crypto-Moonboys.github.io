name = "moonboys-api"
main = "worker.js"
compatibility_date = "2026-04-12"

# Non-secret defaults used by worker.js. Override per environment below when
# a deployment target needs different Worker URLs.
[vars]
TELEGRAM_BOT_USERNAME = "WIKICOMSBOT"
ANTI_CHEAT_WORKER_URL = "https://moonboys-anti-cheat.sercullen.workers.dev"
LEADERBOARD_API_URL = "https://moonboys-leaderboard.sercullen.workers.dev"

# D1 database binding.
# The committed config intentionally does not contain the live production D1
# database UUID. For production deploys, copy this file to an ignored local
# config or inject the real database_id from CI/secrets before running Wrangler.
[[d1_databases]]
binding = "DB"
database_name = "wikicoms"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[env.production]
name = "moonboys-api"

[env.production.vars]
TELEGRAM_BOT_USERNAME = "WIKICOMSBOT"
ANTI_CHEAT_WORKER_URL = "https://moonboys-anti-cheat.sercullen.workers.dev"
LEADERBOARD_API_URL = "https://moonboys-leaderboard.sercullen.workers.dev"

[[env.production.d1_databases]]
binding = "DB"
database_name = "wikicoms"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# ── Telegram secrets ──────────────────────────────────────────────────────────
# Required for POST /telegram/auth and POST /telegram/webhook.
# Set via Wrangler CLI — never commit values to source control:
#
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_BOT_USERNAME
#   wrangler secret put ADMIN_TELEGRAM_IDS
#   wrangler secret put ADMIN_SECRET
#
# TELEGRAM_BOT_TOKEN    — The bot token from BotFather (used for HMAC verification).
# TELEGRAM_BOT_USERNAME — The bot @username (kept for runtime/dashboard consistency).
# ADMIN_TELEGRAM_IDS    — CSV of Telegram user IDs authorised to run admin bot commands.
# ADMIN_SECRET          — Shared secret forwarded as X-Admin-Secret to the anti-cheat worker.
#
# BotFather setup:
#   /setdomain   → set to:  moonboys-api.sercullen.workers.dev
#   Webhook URL  → POST https://moonboys-api.sercullen.workers.dev/telegram/webhook
#   Auth URL     → https://moonboys-api.sercullen.workers.dev/telegram/auth

# ── Anti-cheat admin secrets ──────────────────────────────────────────────────
# Required for /gkban, /gkunban, /gkrisk, /gkclearstrikes bot commands and for
# the GET /telegram/user/status route to read telegram_anticheat_state from D1.
# Set secrets via Wrangler CLI — never commit secret values to source control.
# ADMIN_SECRET must match the moonboys-anti-cheat worker's ADMIN_SECRET.
#
# ANTI_CHEAT_WORKER_URL is a non-secret var above.
# LEADERBOARD_API_URL is a non-secret var above.
