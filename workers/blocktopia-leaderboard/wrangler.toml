name               = "blocktopia-leaderboard"
main               = "worker.js"
compatibility_date = "2025-01-01"

# ── KV namespace bindings ─────────────────────────────────────────────────────
# Create each namespace with `wrangler kv:namespace create <NAME>` and paste
# the returned IDs below.  Never commit live IDs to source control — replace
# the placeholders after first deploy.

[[kv_namespaces]]
binding    = "DISTRICTS"
id         = "YOUR_DISTRICTS_KV_ID"
preview_id = "YOUR_DISTRICTS_KV_ID"

[[kv_namespaces]]
binding    = "SEASONS"
id         = "YOUR_SEASONS_KV_ID"
preview_id = "YOUR_SEASONS_KV_ID"

[[kv_namespaces]]
binding    = "CACHE"
id         = "YOUR_CACHE_KV_ID"
preview_id = "YOUR_CACHE_KV_ID"

# ── Scheduled resets ──────────────────────────────────────────────────────────
# Runs every day at midnight UTC to check for season rollover.
[triggers]
crons = ["0 0 * * *"]

# ── Non-secret variables ───────────────────────────────────────────────────────
[vars]
ALLOWED_ORIGIN        = "https://crypto-moonboys.github.io"
SEASON_LENGTH_DAYS    = "90"
BOARD_LIMIT           = "100"
CACHE_TTL_SECONDS     = "60"
