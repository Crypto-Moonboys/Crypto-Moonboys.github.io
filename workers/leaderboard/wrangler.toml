name               = "moonboys-leaderboard"
main               = "../leaderboard-worker.js"
compatibility_date = "2024-11-01"

[[kv_namespaces]]
binding    = "LEADERBOARD"
id         = "a621c334d9ac439ebaf5f35dd31dddd5"
preview_id = "a621c334d9ac439ebaf5f35dd31dddd5"

[triggers]
crons = ["0 0 * * *"]

[[d1_databases]]
binding       = "DB"
database_name = "wikicoms"
# Do not commit the live production database UUID; inject it from CI/secrets
# or an ignored local Wrangler config before deploying.
database_id   = "00000000-0000-0000-0000-000000000000"
