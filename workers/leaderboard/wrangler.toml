name            = "moonboys-leaderboard"
main            = "../leaderboard-worker.js"
compatibility_date = "2024-11-01"

# KV namespace binding — create with: wrangler kv:namespace create LEADERBOARD
# Then replace the id below with the output from that command.
[[kv_namespaces]]
binding  = "LEADERBOARD"
id       = "REPLACE_WITH_KV_NAMESPACE_ID"
