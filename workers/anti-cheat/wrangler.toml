name               = "moonboys-anti-cheat"
main               = "worker.js"
compatibility_date = "2024-11-01"

# KV namespace — same binding and ID as leaderboard-worker so the anti-cheat
# scanner can write anticheat:blocked:{telegram_id} keys that the leaderboard
# worker reads before accepting score submissions.
[[kv_namespaces]]
binding    = "LEADERBOARD"
id         = "a621c334d9ac439ebaf5f35dd31dddd5"
preview_id = "a621c334d9ac439ebaf5f35dd31dddd5"

# D1 database — same instance as moonboys-api (wikicoms).
# Apply migration 003 before first deploy:
#   wrangler d1 execute wikicoms --file=../moonboys-api/migrations/003_anticheat.sql --remote
[[d1_databases]]
binding       = "DB"
database_name = "wikicoms"
database_id   = "8a36e17a-18fa-4b98-90e1-3f269164b166"

# Weekly cron — every Sunday at 00:00 UTC
[triggers]
crons = ["0 0 * * SUN"]

# Admin secret — set via CLI, never commit the value:
#   wrangler secret put ADMIN_SECRET
# All admin routes require the X-Admin-Secret header ONLY.
# URL query parameter admin_secret is NOT accepted (would leak into Cloudflare logs).
