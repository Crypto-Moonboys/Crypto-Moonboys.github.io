name               = "blocktopia-district"
main               = "worker.js"
compatibility_date = "2025-01-01"

# ════════════════════════════════════════════════════════════════════════════
# ⚠️  STUB WORKER — DO NOT DEPLOY UNTIL KV BINDINGS ARE CONFIGURED
#
# This worker cannot be deployed in its current state.
# All KV namespace IDs are placeholders (YOUR_*_KV_ID).
# Deploying with placeholder IDs will cause runtime KV binding errors.
#
# Before deploying:
#   1. Run: wrangler kv:namespace create DISTRICTS
#           wrangler kv:namespace create NPC_MEMORY
#           wrangler kv:namespace create SEASONS
#           wrangler kv:namespace create CACHE
#   2. Replace each YOUR_*_KV_ID below with the returned namespace IDs.
#   3. Run: wrangler secret put ADMIN_SECRET
#   4. Remove this warning block.
#
# CI guard: .github/workflows/stub-worker-deploy-guard.yml will fail if
# any wrangler.toml in workers/ still contains YOUR_*_KV_ID.
# ════════════════════════════════════════════════════════════════════════════

# ── KV namespace bindings ─────────────────────────────────────────────────────

[[kv_namespaces]]
binding    = "DISTRICTS"
id         = "YOUR_DISTRICTS_KV_ID"
preview_id = "YOUR_DISTRICTS_KV_ID"

[[kv_namespaces]]
binding    = "NPC_MEMORY"
id         = "YOUR_NPC_MEMORY_KV_ID"
preview_id = "YOUR_NPC_MEMORY_KV_ID"

[[kv_namespaces]]
binding    = "SEASONS"
id         = "YOUR_SEASONS_KV_ID"
preview_id = "YOUR_SEASONS_KV_ID"

[[kv_namespaces]]
binding    = "CACHE"
id         = "YOUR_CACHE_KV_ID"
preview_id = "YOUR_CACHE_KV_ID"

# ── Non-secret variables ───────────────────────────────────────────────────────
[vars]
ALLOWED_ORIGIN     = "https://crypto-moonboys.github.io"
DISTRICT_COUNT     = "12"
SEASON_LENGTH_DAYS = "90"
CACHE_TTL_SECONDS  = "60"

# ── Secrets (set via Wrangler CLI — never commit values) ──────────────────────
# wrangler secret put ADMIN_SECRET
# ADMIN_SECRET — required X-Admin-Secret header for admin routes.
