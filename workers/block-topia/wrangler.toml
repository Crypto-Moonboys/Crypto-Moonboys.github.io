name            = "block-topia-score"
main            = "src/index.js"
compatibility_date = "2024-11-01"

# R2 bucket binding — set bucket_name to the value of your CLOUDFLARE_R2_BUCKET secret
# before deploying (e.g. `wrangler deploy --var bucket_name:my-bucket` or edit below).
[[r2_buckets]]
binding     = "R2_BUCKET"
bucket_name = "crypto-moonboys-rpg-memory"

# Non-secret variables per docs/r2-worker-env.md
[vars]
R2_LEADERBOARD_PREFIX    = "leaderboards"
MAZE_SEASON_LENGTH_DAYS  = "90"
MAZE_YEARLY_RESET_UTC    = "12:00"
