name               = "block-topia-score"
main               = "src/index.js"
compatibility_date = "2024-11-01"

# R2 bucket binding names are committed for readability; bucket names are environment-specific.
# Configure real bucket_name values in [env.<name>] sections.

[env.dev]
[[env.dev.r2_buckets]]
binding     = "R2_BUCKET"
bucket_name = "YOUR_DEV_R2_BUCKET"

[env.staging]
[[env.staging.r2_buckets]]
binding     = "R2_BUCKET"
bucket_name = "YOUR_STAGING_R2_BUCKET"

[env.production]
[[env.production.r2_buckets]]
binding     = "R2_BUCKET"
bucket_name = "YOUR_PRODUCTION_R2_BUCKET"

# Non-secret variables per docs/r2-worker-env.md
[vars]
R2_LEADERBOARD_PREFIX    = "leaderboards"
MAZE_SEASON_LENGTH_DAYS  = "90"
MAZE_YEARLY_RESET_UTC    = "12:00"
