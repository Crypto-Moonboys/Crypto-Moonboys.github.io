<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search all canonical articles on Crypto Moonboys Wiki — the main article hub for the site.">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Search / All Articles — Crypto Moonboys Wiki">
  <meta property="og:description" content="Search all canonical articles on Crypto Moonboys Wiki — the main article hub for the site.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://crypto-moonboys.github.io/search.html">
  <meta property="og:image" content="https://crypto-moonboys.github.io/img/CRYPTO-MOONBOYS-BITCOIN-LOGO.png">
  <link rel="canonical" href="https://crypto-moonboys.github.io/search.html">
  <title>Search / All Articles — Crypto Moonboys Wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
  <link rel="stylesheet" href="/css/wiki.css">
  <link rel="stylesheet" href="/css/retro-16bit-theme.css">
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
</head>
<body class="page-search page-has-right-panel">
<main id="content" role="main">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/index.html">Home</a>
        <span class="sep">›</span>
        <span aria-current="page">Search / All Articles</span>
      </nav>

      <h1 class="page-title">🔍 Search Articles</h1>
      <div class="page-title-line" aria-hidden="true"></div>

      <div style="margin-bottom:24px">
        <p style="margin:0 0 12px 0;color:var(--color-text-muted)">
          This is the canonical article hub for the site. All searchable wiki content routes through this page.
        </p>
        <div style="display:flex;gap:10px;max-width:560px">
          <input
            type="search"
            id="search-page-input"
            placeholder="Search by topic, keyword, coin name…"
            aria-label="Search articles"
            style="flex:1;padding:11px 18px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius);color:var(--color-text);font-size:.95rem;outline:none;transition:border-color .2s"
            onfocus="this.style.borderColor='var(--color-accent)'"
            onblur="this.style.borderColor='var(--color-border)'"
          >
        </div>
      </div>

      <h2 class="section-heading" id="search-heading">All Articles</h2>

      <section
        id="ranking-debug"
        class="ranking-debug-panel"
        hidden
        aria-live="polite"
        aria-label="Ranking debug panel"
      >
        <div class="ranking-debug-header">
          <strong>Ranking debug</strong>
          <span id="ranking-debug-query"></span>
        </div>
        <div class="ranking-debug-table-wrap">
          <table class="ranking-debug-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Query score</th>
                <th>Rank score</th>
                <th>Final score</th>
                <th>Rank signals</th>
              </tr>
            </thead>
            <tbody id="ranking-debug-table"></tbody>
          </table>
        </div>
      </section>

      <div
        id="search-results-page"
        class="article-list"
        aria-live="polite"
        aria-label="Search results"
      >
        <!-- Populated by wiki.js -->
      </div>
    </main>

<!-- ── CANONICAL SCRIPT BOOT ─────────────────────────────────────── -->
<!-- 1. Core config -->
<script src="/js/api-config.js"></script>
<!-- 2. Event bus -->
<script src="/js/arcade/core/global-event-bus.js"></script>
<!-- 3. Identity -->
<script src="/js/identity-gate.js"></script>
<!-- 4. State -->
<script src="/js/core/moonboys-state.js"></script>
<!-- 5. Shell + shared components -->
<script src="/js/site-shell.js"></script>
<script src="/js/components/connection-status-panel.js"></script>
<script src="/js/components/global-player-header.js"></script>
<script src="/js/components/live-activity-summary.js"></script>
<!-- 6. Page-specific scripts -->

<script src="/js/wiki.js"></script>
<script src="/js/faction-alignment.js"></script>
</body>
</html>
