name: Block Topia Frontend Smoke

on:
  pull_request:
    paths:
      - 'games/block-topia/**'
      - 'server/block-topia/src/**'
      - '.github/workflows/block-topia-frontend-smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'games/block-topia/**'
      - 'server/block-topia/src/**'
      - '.github/workflows/block-topia-frontend-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skeleton-smoke:
    name: skeleton-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check — client files
        run: |
          node --check games/block-topia/main.js
          node --check games/block-topia/network.js

      - name: Syntax check — server files
        run: |
          node --check server/block-topia/src/index.js
          node --check server/block-topia/src/rooms/MinimalCityRoom.js

      - name: Skeleton smoke — network.js exports and no old handlers
        run: node games/block-topia/tests/skeleton-smoke.test.mjs

      - name: Server safety smoke — MinimalCityRoom guards
        run: node server/block-topia/src/rooms/MinimalCityRoom.safety-smoke.test.mjs
