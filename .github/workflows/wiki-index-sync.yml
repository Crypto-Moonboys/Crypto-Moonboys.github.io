name: Wiki Generated Assets Sync

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
      - 'categories/**'
      - 'scripts/**'
      - 'js/wiki.js'
      - 'js/index_stats_v2.js'
      - 'js/ranking-config.js'
      - 'search.html'
      - 'index.html'
      - 'articles.html'
      - 'about.html'
      - '.github/workflows/wiki-index-sync.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'wiki/**'
      - 'categories/**'
      - 'scripts/**'
      - 'js/wiki.js'
      - 'js/index_stats_v2.js'
      - 'js/ranking-config.js'
      - 'search.html'
      - 'index.html'
      - 'articles.html'
      - 'about.html'
      - '.github/workflows/wiki-index-sync.yml'

permissions:
  contents: write

concurrency:
  group: wiki-generated-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-generated-assets:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'github-actions' &&
      (
        github.event_name != 'push' ||
        !contains(github.event.head_commit.message, 'chore: auto-update wiki generated assets')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate wiki index
        run: node scripts/generate-wiki-index.js

      - name: Generate entity map and SAM memory
        run: node scripts/generate-entity-map.js

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Generate site stats
        run: node scripts/generate-site-stats.js

      - name: Generate graph data
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          # Warn if entity-graph.json exceeds 50 MB threshold
          GRAPH_SIZE=$(stat -c%s js/entity-graph.json 2>/dev/null || echo 0)
          THRESHOLD=$((50 * 1024 * 1024))
          if [ "$GRAPH_SIZE" -gt "$THRESHOLD" ]; then
            echo "::warning file=js/entity-graph.json::entity-graph.json is ${GRAPH_SIZE} bytes, which exceeds the ${THRESHOLD}-byte threshold"
          fi
          node scripts/generate-graph-data.js

      - name: Generate cluster health
        continue-on-error: true
        run: node scripts/generate-cluster-health.js

      - name: Generate authority drift
        continue-on-error: true
        run: node scripts/generate-authority-drift.js

      - name: Generate entity changelog
        continue-on-error: true
        run: node scripts/generate-entity-changelog.js

      - name: Summarise optional-step outcomes
        if: always()
        shell: bash
        run: |
          echo "--- Optional step summary ---"
          echo "Note: steps with continue-on-error:true may have failed silently above."
          echo "Check the individual step logs for: generate-graph-data, generate-cluster-health,"
          echo "  generate-authority-drift, generate-entity-changelog."

      - name: Validate generated assets
        run: node scripts/validate-generated-assets.js

      - name: Run smoke tests
        continue-on-error: true
        run: node scripts/smoke-test.js

      - name: Save ranking snapshot
        continue-on-error: true
        run: node scripts/save-ranking-snapshot.js

      - name: Check for fragile relative paths
        shell: bash
        run: |
          set -u
          FAIL=0
          BAD_PATTERNS=(
            '../index.html'
            '../search.html'
            '../articles.html'
            '../categories/index.html'
            '../img/'
            '../css/'
            '../js/'
            'href="index.html"'
            'href="search.html"'
            'href="articles.html"'
            'href="sam.html"'
            'src="img/"'
            'src="css/"'
          )

          for pattern in "${BAD_PATTERNS[@]}"; do
            matches="$(grep -rFl --include='*.html' "$pattern" wiki/ categories/ about.html 2>/dev/null || true)"
            if [ -n "$matches" ]; then
              echo "::error::Fragile relative path '$pattern' found in:"
              echo "$matches"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi

          echo "All nav/asset paths are root-relative."

      - name: Guard legacy wiki index removal
        shell: bash
        run: |
          set -u

          if [ -f wiki/index.html ]; then
            echo "::error file=wiki/index.html::wiki/index.html must not exist anymore"
            exit 1
          fi

          if grep -q '/wiki/index.html' js/wiki-index.json; then
            echo "::error file=js/wiki-index.json::legacy /wiki/index.html still present in wiki-index"
            exit 1
          fi

          if grep -q '/wiki/index.html' js/entity-map.json; then
            echo "::error file=js/entity-map.json::legacy /wiki/index.html still present in entity-map"
            exit 1
          fi

          if grep -q '/wiki/index.html' sitemap.xml; then
            echo "::error file=sitemap.xml::legacy /wiki/index.html still present in sitemap"
            exit 1
          fi

          echo "Legacy wiki index removal checks passed."

      - name: Guard canonical article hub
        shell: bash
        run: |
          set -u

          if ! grep -q '/search.html' articles.html; then
            echo "::error file=articles.html::articles.html must redirect to /search.html"
            exit 1
          fi

          if ! grep -q 'canonical article hub' search.html; then
            echo "::warning file=search.html::search.html should explicitly describe itself as the canonical article hub"
          fi

          echo "Canonical article hub checks passed."

      - name: Commit generated files
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            js/wiki-index.json \
            js/entity-map.json \
            js/site-stats.json \
            js/graph-data.json \
            js/cluster-health.json \
            js/authority-drift.json \
            js/entity-changelog.json \
            sitemap.xml \
            sam-memory.json \
            index_stats.json \
            snapshots || true

          if git diff --cached --quiet; then
            echo "No generated file changes."
            exit 0
          fi

          git commit -m "chore: auto-update wiki generated assets" || echo "Nothing to commit"
          git push origin HEAD:main || echo "Push skipped"