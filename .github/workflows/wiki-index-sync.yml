name: Wiki Generated Assets Sync

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
      - 'categories/**'
      - 'scripts/**'
      - 'js/wiki.js'
      - 'search.html'
      - 'index.html'
      - 'articles.html'
      - 'about.html'
      - '.github/workflows/wiki-index-sync.yml'
    paths-ignore:
      - 'js/wiki-index.json'
      - 'js/entity-map.json'
      - 'js/site-stats.json'
      - 'sitemap.xml'
      - 'sam-memory.json'
      - 'index_stats.json'
      - '**/*.md'
      - 'img/**'
      - 'css/**'
  pull_request:
    branches:
      - main
    paths:
      - 'wiki/**'
      - 'categories/**'
      - 'scripts/**'
      - 'js/wiki.js'
      - 'search.html'
      - 'index.html'
      - 'articles.html'
      - 'about.html'
      - '.github/workflows/wiki-index-sync.yml'
    paths-ignore:
      - 'js/wiki-index.json'
      - 'js/entity-map.json'
      - 'js/site-stats.json'
      - 'sitemap.xml'
      - 'sam-memory.json'
      - 'index_stats.json'
      - '**/*.md'
      - 'img/**'
      - 'css/**'

permissions:
  contents: write

concurrency:
  group: wiki-generated-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-generated-assets:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'github-actions' &&
      (
        github.event_name != 'push' ||
        !contains(github.event.head_commit.message, 'chore: auto-update wiki generated assets')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate wiki index
        run: node scripts/generate-wiki-index.js

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Generate site stats
        run: node scripts/generate-site-stats.js

      - name: Generate entity map and SAM memory
        run: node scripts/generate-entity-map.js

      - name: Validate generated assets
        run: node scripts/validate-generated-assets.js

      - name: Run smoke tests
        run: node scripts/smoke-test.js

      - name: Check for fragile relative paths
        shell: bash
        run: |
          set -euo pipefail
          FAIL=0
          BAD_PATTERNS=(
            '../index.html'
            '../search.html'
            '../categories/index.html'
            '../img/'
            '../css/'
            '../js/'
            'href="index.html"'
            'href="search.html"'
            'href="sam.html"'
            'src="img/"'
            'src="css/"'
          )

          for pattern in "${BAD_PATTERNS[@]}"; do
            matches="$(grep -rFl --include='*.html' "$pattern" wiki/ categories/ _article-template.html 2>/dev/null || true)"
            if [ -n "$matches" ]; then
              echo "::error::Fragile relative path '$pattern' found in:"
              echo "$matches"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi

          echo "All nav/asset paths are root-relative."

      - name: Guard wiki index redirect stub
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f wiki/index.html ]; then
            echo "::error file=wiki/index.html::wiki/index.html is missing"
            exit 1
          fi

          if ! grep -q '/search.html' wiki/index.html; then
            echo "::error file=wiki/index.html::wiki/index.html must redirect to /search.html"
            exit 1
          fi

          if grep -qi 'recent articles' wiki/index.html; then
            echo "::error file=wiki/index.html::wiki/index.html appears to contain real page content instead of redirect stub"
            exit 1
          fi

          echo "wiki/index.html redirect stub looks correct."

      - name: Commit generated files
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add js/wiki-index.json js/entity-map.json js/site-stats.json sitemap.xml sam-memory.json index_stats.json || true

          if git diff --cached --quiet; then
            echo "No generated file changes."
            exit 0
          fi

          git commit -m "chore: auto-update wiki generated assets"
          git push origin HEAD:main