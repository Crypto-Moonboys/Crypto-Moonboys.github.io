name: Wiki Generated Assets Sync

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
      - 'categories/**'
      - 'scripts/**'
      - 'about.html'
      - 'articles.html'
      - 'search.html'
      - 'index.html'
    paths-ignore:
      - 'js/wiki-index.json'
      - 'js/site-stats.json'
      - 'js/entity-map.json'
      - 'sam-memory.json'
      - 'sitemap.xml'
      - 'index_stats.json'
      - 'css/**'
      - 'img/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths:
      - 'wiki/**'
      - 'categories/**'
      - 'scripts/**'
      - 'about.html'
      - 'articles.html'
      - 'search.html'
      - 'index.html'
    paths-ignore:
      - 'js/wiki-index.json'
      - 'js/site-stats.json'
      - 'js/entity-map.json'
      - 'sam-memory.json'
      - 'sitemap.xml'
      - 'index_stats.json'
      - 'css/**'
      - 'img/**'
      - '**/*.md'

jobs:
  sync-generated-assets:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      (
        github.event_name != 'push' ||
        !contains(github.event.head_commit.message, 'chore: auto-update wiki generated assets')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate wiki search index
        run: node scripts/generate-wiki-index.js

      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.js

      - name: Regenerate site stats
        run: node scripts/generate-site-stats.js

      - name: Regenerate entity map and SAM memory
        run: node scripts/generate-entity-map.js

      - name: Check for fragile parent-relative nav/asset paths
        run: |
          FAIL=0
          # ── Patterns that must NEVER appear in wiki/categories pages or the template ──
          # 1. Parent-relative (../) navigation and asset paths
          DOTDOT_PATTERNS=('../index.html' '../search.html' '../categories/index.html' '../img/' '../css/' '../js/')
          for pattern in "${DOTDOT_PATTERNS[@]}"; do
            matches=$(grep -rFl --include='*.html' "$pattern" wiki/ categories/ _article-template.html 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::Fragile ../ path '$pattern' found in:"
              echo "$matches"
              FAIL=1
            fi
          done
          # 2. Bare (non-root-relative) navigation links — must always start with /
          BARE_PATTERNS=('href="index.html"' 'href="search.html"' 'href="sam.html"')
          for pattern in "${BARE_PATTERNS[@]}"; do
            matches=$(grep -rFl --include='*.html' "$pattern" wiki/ categories/ _article-template.html 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::Bare relative nav path '$pattern' found in:"
              echo "$matches"
              FAIL=1
            fi
          done
          # 3. Bare relative asset references (no leading /)
          BARE_ASSET_PATTERNS=('src="img/' 'src="css/')
          for pattern in "${BARE_ASSET_PATTERNS[@]}"; do
            matches=$(grep -rFl --include='*.html' "$pattern" wiki/ categories/ _article-template.html 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::Bare relative asset path '$pattern' found in:"
              echo "$matches"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "0" ]; then
            echo "All nav/asset paths are root-relative. ✅"
          fi
          exit $FAIL


        if: github.event_name == 'pull_request'
        run: |
          STALE=0
          for f in js/wiki-index.json sitemap.xml js/site-stats.json js/entity-map.json sam-memory.json index_stats.json; do
            if ! git diff --quiet "$f"; then
              echo "::error file=$f::$f is out of date."
              echo "Run the generator scripts locally and commit the result:"
              echo "  node scripts/generate-wiki-index.js"
              echo "  node scripts/generate-sitemap.js"
              echo "  node scripts/generate-site-stats.js"
              echo "  node scripts/generate-entity-map.js"
              git diff "$f"
              STALE=1
            else
              echo "$f is up to date. ✅"
            fi
          done
          exit $STALE

      - name: Commit and push updated assets (main push only)
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=0
          for f in js/wiki-index.json sitemap.xml js/site-stats.json js/entity-map.json sam-memory.json index_stats.json; do
            if ! git diff --quiet "$f"; then
              git add "$f"
              CHANGED=1
            fi
          done
          if [ "$CHANGED" = "1" ]; then
            git commit -m "chore: auto-update wiki generated assets"
            git push
            echo "Generated assets updated and pushed. ✅"
          else
            echo "All generated assets are up to date — nothing to commit. ✅"
          fi
