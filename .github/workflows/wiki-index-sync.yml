name: Wiki Generated Assets Sync

on:
  push:
    branches: [ main ]
permissions:
  contents: write

jobs:
  sync-generated-assets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node scripts/generate-wiki-index.js
      - run: node scripts/generate-entity-map.js
      - run: node scripts/generate-sitemap.js
      - run: node scripts/generate-site-stats.js

      - run: node scripts/validate-generated-assets.js
      - run: node scripts/smoke-test.js

      - run: node scripts/save-ranking-snapshot.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto: update generated assets" || echo "no changes"
          git push
