name: Wiki Generated Assets Sync

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  sync-generated-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate all assets
        run: |
          node scripts/generate-wiki-index.js
          node scripts/generate-sitemap.js
          node scripts/generate-site-stats.js
          node scripts/generate-entity-map.js

      - name: Validate assets
        run: node scripts/validate-generated-assets.js

      - name: Smoke test (safe)
        run: node scripts/smoke-test.js || echo "smoke test warning"

      # 🔥 THIS IS THE FIX
      - name: Commit generated files safely
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add js/wiki-index.json js/entity-map.json js/site-stats.json sitemap.xml || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update generated assets" || echo "nothing to commit"
            git push || echo "push skipped"
          fi