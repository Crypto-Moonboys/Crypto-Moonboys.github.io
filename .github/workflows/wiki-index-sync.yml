name: Wiki Generated Assets Sync

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
      - 'categories/**'
      - 'js/wiki.js'
      - 'js/index_stats_v2.js'
      - 'scripts/**'
      - 'about.html'
      - 'articles.html'
      - 'search.html'
      - 'index.html'
  pull_request:
    branches:
      - main
    paths:
      - 'wiki/**'
      - 'categories/**'
      - 'js/wiki.js'
      - 'js/index_stats_v2.js'
      - 'scripts/**'
      - 'about.html'
      - 'articles.html'
      - 'search.html'
      - 'index.html'

jobs:
  sync-generated-assets:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: auto-update wiki generated assets')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate wiki search index
        run: node scripts/generate-wiki-index.js

      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.js

      - name: Regenerate site stats
        run: node scripts/generate-site-stats.js

      - name: Fail if generated files are stale (PR only)
        if: github.event_name == 'pull_request'
        run: |
          STALE=0
          for f in js/wiki-index.json sitemap.xml js/site-stats.json; do
            if ! git diff --quiet "$f"; then
              echo "::error file=$f::$f is out of date."
              echo "Run the generator scripts locally and commit the result:"
              echo "  node scripts/generate-wiki-index.js"
              echo "  node scripts/generate-sitemap.js"
              echo "  node scripts/generate-site-stats.js"
              git diff "$f"
              STALE=1
            else
              echo "$f is up to date. ✅"
            fi
          done
          exit $STALE

      - name: Commit and push updated assets (main push only)
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=0
          for f in js/wiki-index.json sitemap.xml js/site-stats.json; do
            if ! git diff --quiet "$f"; then
              git add "$f"
              CHANGED=1
            fi
          done
          if [ "$CHANGED" = "1" ]; then
            git commit -m "chore: auto-update wiki generated assets"
            git push
            echo "Generated assets updated and pushed. ✅"
          else
            echo "All generated assets are up to date — nothing to commit. ✅"
          fi
