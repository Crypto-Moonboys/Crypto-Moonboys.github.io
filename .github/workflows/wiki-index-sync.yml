name: Wiki Generated Assets Sync

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sync-generated-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate wiki index
        run: node scripts/generate-wiki-index.js

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Generate site stats
        run: node scripts/generate-site-stats.js

      - name: Generate entity map
        run: node scripts/generate-entity-map.js

      - name: Validate generated assets
        run: node scripts/validate-generated-assets.js

      - name: Run smoke test (non-blocking for now)
        run: |
          node scripts/smoke-test.js || echo "Smoke test failed but not blocking"

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add js/wiki-index.json js/entity-map.json js/site-stats.json sitemap.xml || true

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update generated assets"
            git push
          fi