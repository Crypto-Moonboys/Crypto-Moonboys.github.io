name: Anti-drift check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  anti-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run anti-drift checks
        run: node scripts/anti-drift-check.mjs

      - name: No dead placeholder copy
        run: node scripts/no-dead-placeholder-copy.mjs
