name: Site Shell Smoke

# Browser-rendered smoke tests for the site shell and right HUD.
# Covers:
#   - right-HUD widget presence after JS execution (#homepage-right-panel,
#     #live-feed-widget, Rocket Loader placeholder simulation)
#   - canonical script order and data-cfasync drift
#
# Note: anti-drift (arcade manifest / sidebar / hub parity, XP terminology)
# runs in its own dedicated anti-drift-check.yml workflow and is intentionally
# NOT duplicated here.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  site-shell-smoke:
    name: Site shell & right-HUD browser smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check — canonical boot chain + test harness
        run: |
          node --check js/api-config.js
          node --check js/arcade/core/global-event-bus.js
          node --check js/identity-gate.js
          node --check js/core/moonboys-state.js
          node --check js/site-shell.js
          node --check js/components/connection-status-panel.js
          node --check js/components/global-player-header.js
          node --check js/components/live-activity-summary.js
          node --check scripts/right-hud-browser-smoke.mjs
          node --check scripts/site-shell-parity-audit.mjs
          node --check scripts/anti-drift-check.mjs
          node --check scripts/apply-shell.mjs

      - name: Shell parity audit
        run: npm run test:shell-parity

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Right-HUD browser smoke
        run: npm run test:right-hud
