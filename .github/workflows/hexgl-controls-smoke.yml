name: HexGL Controls Smoke

on:
  pull_request:
    paths:
      - 'games/hexgl-local/**'
      - 'games/hexgl-monster-max/**'
      - 'js/arcade/games/hexgl-monster-max/**'
      - '.github/workflows/hexgl-controls-smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'games/hexgl-local/**'
      - 'games/hexgl-monster-max/**'
      - 'js/arcade/games/hexgl-monster-max/**'
      - '.github/workflows/hexgl-controls-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hexgl-controls-smoke:
    name: hexgl-controls-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check — ShipControls.js
        run: node --check games/hexgl-local/bkcore/hexgl/ShipControls.js

      - name: Syntax check — launch.js
        run: node --check games/hexgl-local/launch.js

      - name: Syntax check — bootstrap.js
        run: node --check js/arcade/games/hexgl-monster-max/bootstrap.js

      - name: HexGL controls smoke — WASD bindings and focus guards
        run: node games/hexgl-local/tests/hexgl-controls-smoke.test.mjs
