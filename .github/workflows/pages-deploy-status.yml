name: Pages Deploy Status

# Checks whether cryptomoonboys.com is serving the latest commit from main
# before running the live-site verifier.
#
# Run MANUALLY after a push to main to confirm the GitHub Pages deployment
# has propagated before trusting the live-site verifier.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pages-deploy-status:
    name: GitHub Pages deployment status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check Pages deployment status
        run: npm run deploy:status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
