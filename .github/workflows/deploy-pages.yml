name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC-based Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments; do not cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prune non-static backend directories
        # server/ and workers/ contain backend source code that is not served
        # by GitHub Pages.  Remove them before packaging the artifact so the
        # upload is smaller and deployment is faster.
        run: |
          rm -rf server/ workers/ scripts/ patches/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
