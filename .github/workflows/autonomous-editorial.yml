name: SAM Lore Ingest

# LANE 1 — SAM Lore Ingest
#
# Purpose:
#   Receive SAM-approved lore/fact exports and update wiki/lore display
#   surfaces. Regenerates indexes, sitemap, graph, trending, and public
#   JSON surfaces from committed SAM export data.
#
# Trigger:
#   - manual workflow_dispatch while SAM is paused
#   - switch to repository_dispatch only when SAM resumes
#
# No daily cron while SAM is paused.
#
# Allowed outputs:
#   wiki/**  snapshots/**  sitemap.xml  sam-memory.json  index_stats.json
#   js/wiki-index.json  js/entity-map.json  js/site-stats.json
#   js/graph-data.json  js/entity-graph-lite.json  js/cluster-health.json
#   js/authority-drift.json  js/entity-changelog.json
#   js/authority-trust.json  js/timeline-intelligence.json
#   js/predictive-growth.json  js/governance-signals.json  js/publishing-readiness.json
#   api/authority.json  api/timeline.json  api/editorial.json
#   api/predictive-growth.json  api/governance.json  api/publishing.json
#
# BLOCKED automated outputs (workflow fails if any are changed):
#   server/**  workers/**  shared/**  docs/block-topia/**  games/block-topia/**
#   Crypto_Moonboys_Master_Source_of_Truth_v1.md
#   city_block_topia_dev_build_deck.md
#   AGENT_ENFORCEMENT.md
#   README* (any README file unless this is an explicit human-approved docs PR)

on:
  workflow_dispatch:
  # future: repository_dispatch (type: sam-lore-export) when SAM resumes

permissions:
  contents: write

concurrency:
  group: sam-lore-ingest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sam-lore-ingest:
    runs-on: ubuntu-latest
    # Never run as a bot commit to avoid self-triggering loops
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'github-actions'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Regenerate display surfaces from committed wiki/SAM data ──────────
      # NOTE: apply-stub-promotions, generate-content-expansion,
      #       ingest-external-intelligence, and apply-hub-reinforcement are
      #       NOT run here. Those scripts create or expand lore content and
      #       require explicit SAM-approved provenance before any automated
      #       run. They remain available for manual execution with a valid
      #       js/sam-export-manifest.json in place.

      - name: Generate wiki index
        run: node scripts/generate-wiki-index.js

      - name: Generate entity map and SAM memory
        run: node scripts/generate-entity-map.js

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Generate site stats
        run: node scripts/generate-site-stats.js

      - name: Deduplicate SAM lore output
        run: node scripts/deduplicate-lore.js

      - name: Generate graph data
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          # entity-graph.json is consumed as input by this script.
          # Warn before loading if it exceeds 50 MB so large-heap failures are visible.
          GRAPH_SIZE=$(stat -c%s js/entity-graph.json 2>/dev/null || echo 0)
          THRESHOLD=$((50 * 1024 * 1024))
          if [ "$GRAPH_SIZE" -gt "$THRESHOLD" ]; then
            echo "::warning file=js/entity-graph.json::entity-graph.json is ${GRAPH_SIZE} bytes, which exceeds the ${THRESHOLD}-byte threshold"
          fi
          node scripts/generate-graph-data.js

      - name: Generate entity graph lite
        continue-on-error: true
        run: node scripts/generate-entity-graph-lite.js

      - name: Generate cluster health
        continue-on-error: true
        run: node scripts/generate-cluster-health.js

      - name: Generate authority drift
        continue-on-error: true
        run: node scripts/generate-authority-drift.js

      - name: Generate entity changelog
        continue-on-error: true
        run: node scripts/generate-entity-changelog.js

      - name: Summarise optional-step outcomes
        if: always()
        shell: bash
        run: |
          echo "--- Optional step summary ---"
          echo "Note: steps with continue-on-error:true may have failed silently above."
          echo "Check the individual step logs for: generate-graph-data, generate-cluster-health,"
          echo "  generate-authority-drift, generate-entity-changelog."

      # ── Phase 5: Authority, Trust & Timeline Intelligence ─────────────────

      - name: Generate Authority & Trust
        run: node scripts/generate-authority-trust.js

      - name: Generate Timeline Intelligence
        run: node scripts/generate-timeline-intelligence.js

      - name: Copy API Outputs
        run: |
          mkdir -p api
          cp js/authority-trust.json api/authority.json
          cp js/timeline-intelligence.json api/timeline.json
          cp js/editorial-changelog.json api/editorial.json

      # ── Phase 6: Predictive Intelligence & Governance ─────────────────────

      - name: Generate Predictive Growth
        run: node scripts/generate-predictive-growth.js

      - name: Generate Governance Signals
        run: node scripts/generate-governance-signals.js

      - name: Generate Publishing Readiness
        run: node scripts/generate-publishing-readiness.js

      - name: Copy Phase 6 API Outputs
        run: |
          mkdir -p api
          cp js/predictive-growth.json api/predictive-growth.json
          cp js/governance-signals.json api/governance.json
          cp js/publishing-readiness.json api/publishing.json

      # ── Validation ────────────────────────────────────────────────────────

      - name: Verify Phase 5 & 6 Outputs
        run: |
          node -e "
          const fs = require('fs');
          const files = [
            'js/authority-trust.json',
            'js/timeline-intelligence.json',
            'js/predictive-growth.json',
            'js/governance-signals.json',
            'js/publishing-readiness.json'
          ];
          let failed = false;
          files.forEach(file => {
            if (!fs.existsSync(file)) {
              console.error('Missing file:', file);
              failed = true;
            } else {
              const data = JSON.parse(fs.readFileSync(file, 'utf8'));
              if (!data || (Array.isArray(data) && data.length === 0)) {
                console.error('Empty or invalid JSON:', file);
                failed = true;
              }
            }
          });
          if (failed) process.exit(1);
          console.log('All Phase 5 & 6 outputs verified.');
          "

      - name: Validate generated assets
        run: node scripts/validate-generated-assets.js

      - name: Run smoke tests
        run: node scripts/smoke-test.js

      # ── Diff guard: fail if automation touched any blocked path ───────────

      - name: Diff guard — block changes to protected paths
        shell: bash
        run: |
          BLOCKED=(
            "server/"
            "workers/"
            "shared/"
            "docs/block-topia/"
            "games/block-topia/"
            "Crypto_Moonboys_Master_Source_of_Truth_v1.md"
            "city_block_topia_dev_build_deck.md"
            "AGENT_ENFORCEMENT.md"
          )
          # Collect both modified tracked files and new untracked files
          CHANGED_FILES=$(
            { git diff --name-only HEAD 2>/dev/null; \
              git ls-files --others --exclude-standard 2>/dev/null; } | sort -u
          )
          FAIL=0
          for pattern in "${BLOCKED[@]}"; do
            if echo "$CHANGED_FILES" | grep -qF "$pattern"; then
              echo "::error::Automation attempted to modify blocked path: $pattern"
              FAIL=1
            fi
          done
          # README-style files are blocked regardless of directory.
          # Covers: README, README.md, readme.md, READ.ME, read.me, etc.
          if echo "$CHANGED_FILES" | grep -iEq '(^|/)(README|READ\.ME)'; then
            echo "::error::Automation attempted to modify a README-style file (blocked unless human-approved docs PR)"
            FAIL=1
          fi
          if [ "$FAIL" -ne 0 ]; then
            echo "Aborting: blocked path(s) modified. No commit will be made."
            exit 1
          fi
          echo "Diff guard passed — no blocked paths modified."

      # ── Commit SAM lore ingest outputs ────────────────────────────────────

      - name: Commit SAM lore ingest outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # js/editorial-changelog.json is written by Phase 6 scripts:
          # generate-governance-signals, generate-predictive-growth,
          # generate-publishing-readiness.
          git add \
            js/editorial-changelog.json \
            js/wiki-index.json \
            js/entity-map.json \
            js/site-stats.json \
            js/graph-data.json \
            js/entity-graph-lite.json \
            js/cluster-health.json \
            js/authority-drift.json \
            js/entity-changelog.json \
            js/authority-trust.json \
            js/timeline-intelligence.json \
            js/predictive-growth.json \
            js/governance-signals.json \
            js/publishing-readiness.json \
            api/authority.json \
            api/timeline.json \
            api/editorial.json \
            api/predictive-growth.json \
            api/governance.json \
            api/publishing.json \
            sitemap.xml \
            sam-memory.json \
            index_stats.json \
            wiki/ \
            snapshots || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: SAM lore ingest — regenerate display surfaces [skip ci]"
          git push origin HEAD:${{ github.ref_name }} || echo "Push skipped"
