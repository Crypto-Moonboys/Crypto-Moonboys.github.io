name: Autonomous Editorial Operations (DISABLED — Human Emergency Recovery Only)

# ⚠️  WARNING — DO NOT RE-ENABLE THE CRON SCHEDULE.
#
# SAM (HODLKONG64/HAY-MUM-IM-BUILDING-AGENTS-OF-CHANGE) is the brain / lore
# validator.  This website is the DISPLAY LAYER only.
#
# This workflow is intentionally manual-only.  It must NOT run on a schedule.
# It must NOT autonomously create or commit lore/content to main.
#
# Only trigger this manually if a human explicitly needs emergency recovery of
# derived display files (wiki-index, sitemap, api outputs, etc.) after a
# confirmed SAM export.  Do not use it to generate new lore independently.
#
# Once SAM is resumed, content updates flow:
#   SAM validates → SAM exports → website ingests SAM output only.
#
# Do NOT add repository_dispatch, a schedule, or any automatic trigger here
# until the SAM architecture is fully re-enabled and explicitly approved.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          Type CONFIRM to acknowledge this is a human-initiated emergency
          recovery run, not an autonomous lore generation run.
        required: true
        default: ''

permissions:
  contents: write

concurrency:
  group: autonomous-editorial-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autonomous-editorial:
    runs-on: ubuntu-latest
    # Guard: only run when a human explicitly confirmed the emergency trigger.
    if: |
      github.event.inputs.confirm == 'CONFIRM' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'github-actions'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Phase 4: Autonomous Editorial Scripts ──────────────────────────────

      - name: Apply stub promotions
        run: node scripts/apply-stub-promotions.js

      - name: Generate content expansion
        run: node scripts/generate-content-expansion.js

      - name: Ingest external intelligence
        run: node scripts/ingest-external-intelligence.js

      - name: Apply hub reinforcement
        run: node scripts/apply-hub-reinforcement.js

      # ── Regenerate downstream assets ──────────────────────────────────────

      - name: Generate wiki index
        run: node scripts/generate-wiki-index.js

      - name: Generate entity map and SAM memory
        run: node scripts/generate-entity-map.js

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Generate site stats
        run: node scripts/generate-site-stats.js

      - name: Deduplicate SAM lore output
        run: node scripts/deduplicate-lore.js

      - name: Generate graph data
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          # entity-graph.json is consumed as input by this script.
          # Warn before loading if it exceeds 50 MB so large-heap failures are visible.
          GRAPH_SIZE=$(stat -c%s js/entity-graph.json 2>/dev/null || echo 0)
          THRESHOLD=$((50 * 1024 * 1024))
          if [ "$GRAPH_SIZE" -gt "$THRESHOLD" ]; then
            echo "::warning file=js/entity-graph.json::entity-graph.json is ${GRAPH_SIZE} bytes, which exceeds the ${THRESHOLD}-byte threshold"
          fi
          node scripts/generate-graph-data.js

      - name: Generate entity graph lite
        continue-on-error: true
        run: node scripts/generate-entity-graph-lite.js

      - name: Generate cluster health
        continue-on-error: true
        run: node scripts/generate-cluster-health.js

      - name: Generate authority drift
        continue-on-error: true
        run: node scripts/generate-authority-drift.js

      - name: Generate entity changelog
        continue-on-error: true
        run: node scripts/generate-entity-changelog.js

      - name: Summarise optional-step outcomes
        if: always()
        shell: bash
        run: |
          echo "--- Optional step summary ---"
          echo "Note: steps with continue-on-error:true may have failed silently above."
          echo "Check the individual step logs for: generate-graph-data, generate-cluster-health,"
          echo "  generate-authority-drift, generate-entity-changelog."

      # ── Phase 5: Authority, Trust & Timeline Intelligence ─────────────────

      - name: Generate Authority & Trust
        run: node scripts/generate-authority-trust.js

      - name: Generate Timeline Intelligence
        run: node scripts/generate-timeline-intelligence.js

      - name: Copy API Outputs
        run: |
          mkdir -p api
          cp js/authority-trust.json api/authority.json
          cp js/timeline-intelligence.json api/timeline.json
          cp js/editorial-changelog.json api/editorial.json

      # ── Phase 6: Predictive Intelligence & Governance ─────────────────────

      - name: Generate Predictive Growth
        run: node scripts/generate-predictive-growth.js

      - name: Generate Governance Signals
        run: node scripts/generate-governance-signals.js

      - name: Generate Publishing Readiness
        run: node scripts/generate-publishing-readiness.js

      - name: Copy Phase 6 API Outputs
        run: |
          mkdir -p api
          cp js/predictive-growth.json api/predictive-growth.json
          cp js/governance-signals.json api/governance.json
          cp js/publishing-readiness.json api/publishing.json

      # ── Validation ────────────────────────────────────────────────────────

      - name: Verify Phase 5 & 6 Outputs
        run: |
          node -e "
          const fs = require('fs');
          const files = [
            'js/authority-trust.json',
            'js/timeline-intelligence.json',
            'js/predictive-growth.json',
            'js/governance-signals.json',
            'js/publishing-readiness.json'
          ];
          let failed = false;
          files.forEach(file => {
            if (!fs.existsSync(file)) {
              console.error('Missing file:', file);
              failed = true;
            } else {
              const data = JSON.parse(fs.readFileSync(file, 'utf8'));
              if (!data || (Array.isArray(data) && data.length === 0)) {
                console.error('Empty or invalid JSON:', file);
                failed = true;
              }
            }
          });
          if (failed) process.exit(1);
          console.log('All Phase 5 & 6 outputs verified.');
          "

      - name: Validate generated assets
        run: node scripts/validate-generated-assets.js

      - name: Run smoke tests
        run: node scripts/smoke-test.js

      # ── Commit deterministic changes ──────────────────────────────────────

      - name: Commit autonomous editorial outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            js/editorial-changelog.json \
            js/ingested-intelligence.json \
            js/wiki-index.json \
            js/entity-map.json \
            js/site-stats.json \
            js/graph-data.json \
            js/entity-graph-lite.json \
            js/cluster-health.json \
            js/authority-drift.json \
            js/entity-changelog.json \
            js/authority-trust.json \
            js/timeline-intelligence.json \
            js/predictive-growth.json \
            js/governance-signals.json \
            js/publishing-readiness.json \
            api/authority.json \
            api/timeline.json \
            api/editorial.json \
            api/predictive-growth.json \
            api/governance.json \
            api/publishing.json \
            sitemap.xml \
            sam-memory.json \
            index_stats.json \
            wiki/ \
            snapshots || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: autonomous editorial operations [skip ci]"
          git push origin HEAD:main || echo "Push skipped"
