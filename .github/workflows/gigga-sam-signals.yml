name: GIGGA SAM Signals

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [sam-update]

jobs:
  build-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install axios openai

      - name: Generate signals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node gigga-sam/generate-signals.mjs

      - name: Commit signals
        run: |
          git config user.name "gigga-sam-bot"
          git config user.email "bot@moonboys.ai"
          git add games/block-topia/data/live-signals.json
          git commit -m "update live signals" || echo "no changes"
          git push
