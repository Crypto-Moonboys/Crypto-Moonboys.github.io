name: GIGGA SAM Signals

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types:
      - sam-update

permissions:
  contents: write

concurrency:
  group: gigga-sam-signals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gigga-sam/package-lock.json

      - name: Install GIGGA SAM dependencies
        run: npm ci --prefix gigga-sam

      - name: Generate live signals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: npm run generate-signals --prefix gigga-sam

      - name: Commit updated live signals
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- games/block-topia/data/live-signals.json; then
            echo "No live signal changes detected."
            exit 0
          fi

          git add games/block-topia/data/live-signals.json
          git commit -m "chore: refresh block topia live signals [skip ci]"
          git push
