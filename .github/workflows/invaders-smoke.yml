name: Invaders 3008 smoke

on:
  push:
    paths:
      - 'js/arcade/games/invaders/**'
      - 'games/invaders-3008/**'
      - 'js/arcade/core/audio.js'
  pull_request:
    paths:
      - 'js/arcade/games/invaders/**'
      - 'games/invaders-3008/**'
      - 'js/arcade/core/audio.js'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Invaders 3008 smoke test
        run: node games/invaders-3008/tests/invaders-smoke.test.mjs
