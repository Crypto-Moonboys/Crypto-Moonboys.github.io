name: Stub Worker Deploy Guard

# Prevents accidental deployment of stub workers that still have placeholder
# KV namespace IDs (YOUR_*_KV_ID) in their wrangler.toml files.
#
# Any wrangler.toml under workers/ containing a YOUR_*_KV_ID placeholder
# indicates the worker has not been configured for real deployment.
# Deploying such a worker would result in KV binding errors at runtime.

on:
  pull_request:
    paths:
      - 'workers/**/wrangler.toml'
      - '.github/workflows/stub-worker-deploy-guard.yml'
  push:
    branches:
      - main
    paths:
      - 'workers/**/wrangler.toml'
      - '.github/workflows/stub-worker-deploy-guard.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard-stub-workers:
    name: No YOUR_*_KV_ID placeholders in wrangler.toml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check for placeholder KV IDs
        shell: bash
        run: |
          set -u
          FAIL=0
          echo "Scanning workers/**/wrangler.toml for placeholder KV IDs..."

          while IFS= read -r -d '' tomlFile; do
            if grep -q 'YOUR_.*_KV_ID' "$tomlFile"; then
              echo "::error file=${tomlFile}::${tomlFile} contains placeholder YOUR_*_KV_ID — worker is not deploy-ready. Replace KV IDs before deploying."
              FAIL=1
            fi
          done < <(find workers -name 'wrangler.toml' -print0)

          if [ "$FAIL" -eq 0 ]; then
            echo "All wrangler.toml files are free of placeholder KV IDs."
          else
            echo ""
            echo "To fix: run 'wrangler kv:namespace create <NAME>' for each binding,"
            echo "replace the YOUR_*_KV_ID placeholder, and remove the STUB WORKER warning block."
            exit 1
          fi
